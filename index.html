<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CL Jobs Scanner — AI, Web Dev, SEO & App Development</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232733;
      --border: #2e3345;
      --text: #e4e6ed;
      --text-dim: #8b8fa3;
      --accent: #6c8cff;
      --accent-dim: #4a64c4;
      --green: #4ade80;
      --amber: #fbbf24;
      --red: #f87171;
      --purple: #a78bfa;
      --cyan: #22d3ee;
      --pink: #f472b6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Header */
    header {
      padding: 40px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    header h1 span { color: var(--accent); }
    header p { color: var(--text-dim); font-size: 15px; }
    .meta-row {
      display: flex;
      gap: 24px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .meta-row span { display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.green { background: var(--green); }
    .dot.amber { background: var(--amber); }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .stat-card .label {
      font-size: 13px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
    }
    .stat-card .sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Search & Filter */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 250px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-dim); }

    .filter-btn {
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: #fff;
    }

    /* Category Sections */
    .category-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .category-header:hover { background: var(--surface2); }
    .category-header .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .category-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .category-header h2 { font-size: 16px; font-weight: 600; }
    .category-count {
      background: var(--surface2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }
    .chevron {
      color: var(--text-dim);
      transition: transform 0.3s;
      font-size: 14px;
    }
    .category-section.open .chevron { transform: rotate(180deg); }

    .category-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .category-section.open .category-body { max-height: 50000px; }

    /* City Groups */
    .city-group {
      border-top: 1px solid var(--border);
    }
    .city-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 12px 52px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 14px;
    }
    .city-header:hover { background: var(--surface2); }
    .city-name {
      font-weight: 500;
      text-transform: capitalize;
    }
    .city-count {
      font-size: 12px;
      color: var(--text-dim);
      background: var(--bg);
      padding: 2px 10px;
      border-radius: 12px;
    }
    .city-chevron {
      color: var(--text-dim);
      transition: transform 0.3s;
      font-size: 12px;
      margin-left: 8px;
    }
    .city-group.open .city-chevron { transform: rotate(180deg); }

    .city-listings {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .city-group.open .city-listings { max-height: 50000px; }

    /* Job Listings */
    .job-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 20px 10px 72px;
      border-top: 1px solid var(--border);
      transition: background 0.15s;
    }
    .job-item:hover { background: var(--surface2); }
    .job-item a {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      line-height: 1.4;
    }
    .job-item a:hover { text-decoration: underline; }
    .job-info { flex: 1; }
    .job-desc {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
      line-height: 1.5;
    }
    .job-query {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Expand/Collapse All */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .toolbar-label { font-size: 14px; color: var(--text-dim); }
    .toolbar-actions { display: flex; gap: 8px; }
    .text-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .text-btn:hover { background: var(--surface2); }

    /* Category colors */
    .cat-ai { background: rgba(108, 140, 255, 0.15); color: var(--accent); }
    .cat-agent { background: rgba(167, 139, 250, 0.15); color: var(--purple); }
    .cat-web { background: rgba(34, 211, 238, 0.15); color: var(--cyan); }
    .cat-seo { background: rgba(74, 222, 128, 0.15); color: var(--green); }
    .cat-app { background: rgba(244, 114, 182, 0.15); color: var(--pink); }
    .cat-cyan { background: rgba(34, 211, 238, 0.15); color: var(--cyan); }
    .cat-other { background: rgba(251, 191, 36, 0.15); color: var(--amber); }

    /* Responsive */
    @media (max-width: 640px) {
      .container { padding: 16px; }
      header h1 { font-size: 22px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .job-item { padding-left: 52px; }
      .city-header { padding-left: 36px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>CL Jobs Scanner <span>// Top 30 Wealthiest Markets</span></h1>
      <p>Craigslist job listings from the 30 wealthiest zip codes in the US and internationally — website development, SEO, AI/Claude setup, and app development opportunities.</p>
      <div class="meta-row" id="meta-row">
        <span><span class="dot amber"></span> Loading data...</span>
      </div>
    </header>

    <div class="stats-grid" id="stats-grid"></div>

    <div class="controls">
      <input type="text" class="search-box" id="search" placeholder="Search jobs by title, city, or keyword...">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="web">Web Dev</button>
      <button class="filter-btn" data-filter="cms">WordPress / Shopify</button>
      <button class="filter-btn" data-filter="seo">SEO</button>
      <button class="filter-btn" data-filter="ai">Claude / OpenAI</button>
      <button class="filter-btn" data-filter="aidev">AI Dev</button>
      <button class="filter-btn" data-filter="app">App Dev</button>
    </div>

    <div class="toolbar">
      <span class="toolbar-label" id="results-count"></span>
      <div class="toolbar-actions">
        <button class="text-btn" onclick="expandAll()">Expand All</button>
        <button class="text-btn" onclick="collapseAll()">Collapse All</button>
      </div>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading results...</p>
      </div>
    </div>
  </div>

  <script>
    // Data & State
    let allData = { results: [], categories: {}, meta: {} };
    let activeFilter = 'all';
    let searchQuery = '';

    // Category definitions
    const CATEGORIES = {
      'web': {
        name: 'Website Development & Design',
        icon: '🌐',
        colorClass: 'cat-web',
        keywords: ['website', 'web develop', 'web design', 'web hosting', 'frontend', 'html', 'full stack', 'fullstack', 'landing page']
      },
      'cms': {
        name: 'WordPress / Shopify / CMS',
        icon: '🛒',
        colorClass: 'cat-cyan',
        keywords: ['wordpress', 'shopify', 'squarespace', 'wix', 'ecommerce', 'e-commerce', 'woocommerce', 'magento']
      },
      'seo': {
        name: 'SEO & Digital Marketing',
        icon: '📊',
        colorClass: 'cat-seo',
        keywords: ['seo', 'search engine', 'optimization', 'google analytics', 'sem ', 'search market', 'digital market']
      },
      'ai': {
        name: 'Claude / OpenAI / AI Setup',
        icon: '🤖',
        colorClass: 'cat-ai',
        keywords: ['claude', 'openai', 'chatgpt', 'openclaw', 'anthropic', 'gpt']
      },
      'aidev': {
        name: 'AI Development & Automation',
        icon: '🧠',
        colorClass: 'cat-agent',
        keywords: ['ai develop', 'ai integrat', 'automat', 'machine learn', 'chatbot', 'prompt engineer', 'llm']
      },
      'app': {
        name: 'App Development',
        icon: '📱',
        colorClass: 'cat-app',
        keywords: ['app develop', 'mobile app', 'ios develop', 'android', 'react native', 'flutter']
      },
      'other': {
        name: 'Other Tech / General',
        icon: '💼',
        colorClass: 'cat-other',
        keywords: []
      }
    };

    function categorize(result) {
      const text = (result.title + ' ' + result.query).toLowerCase();
      if (CATEGORIES.ai.keywords.some(k => text.includes(k))) return 'ai';
      if (CATEGORIES.aidev.keywords.some(k => text.includes(k))) return 'aidev';
      if (CATEGORIES.seo.keywords.some(k => text.includes(k))) return 'seo';
      if (CATEGORIES.cms.keywords.some(k => text.includes(k))) return 'cms';
      if (CATEGORIES.app.keywords.some(k => text.includes(k))) return 'app';
      if (CATEGORIES.web.keywords.some(k => text.includes(k))) return 'web';
      return 'other';
    }

    // City name formatter
    const CITY_NAMES = {
      'sfbay': 'Atherton / SF Bay Area, CA',
      'newyork': 'Sagaponack / New York, NY',
      'losangeles': 'Beverly Hills / Los Angeles, CA',
      'miami': 'Fisher Island / Miami, FL',
      'washingtondc': 'Great Falls / Washington D.C.',
      'boston': 'Weston / Boston, MA',
      'chicago': 'Winnetka / Chicago, IL',
      'seattle': 'Medina / Seattle, WA',
      'dallas': 'Highland Park / Dallas, TX',
      'houston': 'River Oaks / Houston, TX',
      'sandiego': 'Rancho Santa Fe / San Diego, CA',
      'orangecounty': 'Newport Beach / Orange County, CA',
      'denver': 'Cherry Hills Village / Denver, CO',
      'atlanta': 'Buckhead / Atlanta, GA',
      'nashville': 'Belle Meade / Nashville, TN',
      'austin': 'West Lake Hills / Austin, TX',
      'phoenix': 'Paradise Valley / Phoenix, AZ',
      'raleigh': 'Raleigh / Research Triangle, NC',
      'portland': 'Lake Oswego / Portland, OR',
      'minneapolis': 'Wayzata / Minneapolis, MN',
      'london': 'Kensington & Chelsea / London, UK',
      'zurich': 'Zurich, Switzerland',
      'dubai': 'Dubai, UAE',
      'singapore': 'Singapore',
      'hongkong': 'Hong Kong',
      'tokyo': 'Minato / Tokyo, Japan',
      'sydney': 'Eastern Suburbs / Sydney, Australia',
      'amsterdam': 'Canal Belt / Amsterdam, Netherlands',
      'toronto': 'Bridle Path / Toronto, Canada',
      'vancouver': 'West Vancouver, Canada',
    };

    function formatCity(slug) {
      if (CITY_NAMES[slug]) return CITY_NAMES[slug];
      return slug.replace(/([a-z])([A-Z])/g, '$1 $2')
                 .replace(/^./, s => s.toUpperCase())
                 .replace(/nc$/, ', NC').replace(/ga$/, ', GA').replace(/sc$/, ', SC')
                 .replace(/mo$/, ', MO').replace(/tn$/, ', TN').replace(/wv$/, ', WV');
    }

    // Load data
    async function loadData() {
      try {
        const resp = await fetch('results-all.json');
        if (!resp.ok) throw new Error('No data yet');
        const raw = await resp.json();

        // Handle both aggregated format and direct format
        let results = [];
        if (raw.categories) {
          for (const [cat, items] of Object.entries(raw.categories)) {
            results.push(...items);
          }
        } else if (raw.results) {
          results = raw.results;
        }

        // Deduplicate
        const seen = new Set();
        allData.results = results.filter(r => {
          if (!r.url || seen.has(r.url)) return false;
          seen.add(r.url);
          return true;
        });

        allData.meta = {
          total: allData.results.length,
          scrapedAt: raw.scrapedAt || new Date().toISOString(),
          citiesCount: raw.citiesCount || new Set(allData.results.map(r => r.city)).size,
        };

        render();
      } catch (e) {
        // Try loading individual batch files
        let results = [];
        let citiesCount = 0;
        for (let i = 0; i < 15; i++) {
          try {
            const resp = await fetch(`results-v2-batch-${i}.json`);
            if (resp.ok) {
              const data = await resp.json();
              results.push(...(data.results || []));
              citiesCount += data.citiesCount || 0;
            }
          } catch {}
        }

        if (results.length === 0) {
          document.getElementById('content').innerHTML = `
            <div class="empty-state">
              <div class="icon">📡</div>
              <h3>Scraping in Progress</h3>
              <p>Results will appear here once the scrapers complete.<br>Refresh this page to check for updates.</p>
            </div>`;
          return;
        }

        const seen = new Set();
        allData.results = results.filter(r => {
          if (!r.url || seen.has(r.url)) return false;
          seen.add(r.url);
          return true;
        });
        allData.meta = { total: allData.results.length, citiesCount };
        render();
      }
    }

    function getFilteredResults() {
      return allData.results.filter(r => {
        const cat = categorize(r);
        if (activeFilter !== 'all' && cat !== activeFilter) return false;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          return r.title.toLowerCase().includes(q) ||
                 r.city.toLowerCase().includes(q) ||
                 (r.query && r.query.toLowerCase().includes(q));
        }
        return true;
      });
    }

    function render() {
      renderMeta();
      renderStats();
      renderCategories();
    }

    function renderMeta() {
      const cities = new Set(allData.results.map(r => r.city)).size;
      document.getElementById('meta-row').innerHTML = `
        <span><span class="dot green"></span> ${allData.results.length} listings found</span>
        <span>${cities} cities scraped</span>
        <span>Updated: ${new Date().toLocaleDateString()}</span>
      `;
    }

    function renderStats() {
      const catCounts = {};
      for (const r of allData.results) {
        const cat = categorize(r);
        catCounts[cat] = (catCounts[cat] || 0) + 1;
      }

      const cityCount = new Set(allData.results.map(r => r.city)).size;

      const stats = [
        { label: 'Total Listings', value: allData.results.length, sub: `across ${cityCount} wealthy markets`, color: 'var(--accent)' },
        { label: 'Web Dev', value: catCounts.web || 0, sub: 'websites & design', color: 'var(--cyan)' },
        { label: 'WP / Shopify', value: catCounts.cms || 0, sub: 'CMS & ecommerce', color: 'var(--cyan)' },
        { label: 'SEO', value: catCounts.seo || 0, sub: 'search & marketing', color: 'var(--green)' },
        { label: 'Claude / OpenAI', value: catCounts.ai || 0, sub: 'AI setup', color: 'var(--accent)' },
        { label: 'AI Dev', value: catCounts.aidev || 0, sub: 'automation & dev', color: 'var(--purple)' },
      ];

      document.getElementById('stats-grid').innerHTML = stats.map(s => `
        <div class="stat-card">
          <div class="label">${s.label}</div>
          <div class="value" style="color: ${s.color}">${s.value.toLocaleString()}</div>
          <div class="sub">${s.sub}</div>
        </div>
      `).join('');
    }

    function renderCategories() {
      const filtered = getFilteredResults();
      document.getElementById('results-count').textContent =
        `Showing ${filtered.length} of ${allData.results.length} listings`;

      // Group by category, then by city
      const grouped = {};
      for (const r of filtered) {
        const cat = categorize(r);
        if (!grouped[cat]) grouped[cat] = {};
        if (!grouped[cat][r.city]) grouped[cat][r.city] = [];
        grouped[cat][r.city].push(r);
      }

      const order = ['web', 'cms', 'seo', 'ai', 'aidev', 'app', 'other'];
      const html = order.map(catKey => {
        if (!grouped[catKey]) return '';
        const catDef = CATEGORIES[catKey];
        const cities = grouped[catKey];
        const totalInCat = Object.values(cities).reduce((s, arr) => s + arr.length, 0);
        const sortedCities = Object.entries(cities).sort((a, b) => b[1].length - a[1].length);

        return `
          <div class="category-section" data-cat="${catKey}">
            <div class="category-header" onclick="toggleCategory(this)">
              <div class="left">
                <div class="category-icon ${catDef.colorClass}">${catDef.icon}</div>
                <h2>${catDef.name}</h2>
              </div>
              <div style="display:flex;align-items:center;gap:12px">
                <span class="category-count">${totalInCat} listings</span>
                <span class="chevron">▼</span>
              </div>
            </div>
            <div class="category-body">
              ${sortedCities.map(([city, items]) => `
                <div class="city-group" data-city="${city}">
                  <div class="city-header" onclick="toggleCity(this)">
                    <span class="city-name">${items[0].label || formatCity(city)}</span>
                    <div>
                      <span class="city-count">${items.length} job${items.length !== 1 ? 's' : ''}</span>
                      <span class="city-chevron">▼</span>
                    </div>
                  </div>
                  <div class="city-listings">
                    ${items.map(item => `
                      <div class="job-item">
                        <div class="job-info">
                          <a href="${item.url}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a>
                          ${item.description ? `<div class="job-desc">${escapeHtml(item.description)}</div>` : ''}
                        </div>
                        <span class="job-query">${escapeHtml(item.query || '')}</span>
                      </div>
                    `).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('content').innerHTML = html || `
        <div class="empty-state">
          <div class="icon">🔍</div>
          <h3>No results found</h3>
          <p>Try adjusting your search or filter criteria.</p>
        </div>`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Interactions
    function toggleCategory(header) {
      header.closest('.category-section').classList.toggle('open');
    }

    function toggleCity(header) {
      header.closest('.city-group').classList.toggle('open');
    }

    function expandAll() {
      document.querySelectorAll('.category-section').forEach(s => s.classList.add('open'));
      document.querySelectorAll('.city-group').forEach(g => g.classList.add('open'));
    }

    function collapseAll() {
      document.querySelectorAll('.category-section').forEach(s => s.classList.remove('open'));
      document.querySelectorAll('.city-group').forEach(g => g.classList.remove('open'));
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderCategories();
      });
    });

    // Search
    let searchTimeout;
    document.getElementById('search').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = e.target.value;
        renderCategories();
      }, 200);
    });

    // Auto-refresh every 30s if no data
    let refreshInterval;
    function startAutoRefresh() {
      refreshInterval = setInterval(() => {
        if (allData.results.length === 0) {
          loadData();
        } else {
          clearInterval(refreshInterval);
        }
      }, 30000);
    }

    // Init
    loadData();
    startAutoRefresh();
  </script>
